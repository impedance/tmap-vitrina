services:
  # ─── Production container: Serves built frontend + Express API ─────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      # SQLite database file (persisted via volume)
      - DATABASE_URL=file:./data/prod.db
      - PORT=3002
      - NODE_ENV=production
    ports:
      - "3002:3002"
    volumes:
      # Persist SQLite database data
      - prod-data:/app/data
      # Persist uploaded files
      - prod-uploads:/app/server/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  prod-data:
  prod-uploads:
