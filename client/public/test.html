<!DOCTYPE html>
<html>

<head>
    <title>Test TG App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>

<body>
    <h1>Telegram Mini App Test</h1>
    <p id="info">Loading...</p>
    <script>
        try {
            window.Telegram.WebApp.ready();
            document.getElementById('info').innerText = JSON.stringify(window.Telegram.WebApp.initDataUnsafe, null, 2);
        } catch (e) {
            document.getElementById('info').innerText = 'Error: ' + e.message;
        }
    </script>
</body>

</html>
